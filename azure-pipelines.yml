- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      set -euo pipefail
      
      # Install Trivy
      sudo apt-get update
      sudo apt-get install -y wget apt-transport-https gnupg lsb-release
      
      wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
      echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
      
      sudo apt-get update
      sudo apt-get install -y trivy
      
      echo "Trivy version:"
      trivy -v
      
      echo "Scanning repo filesystem..."
      trivy fs --exit-code 1 --severity HIGH,CRITICAL --no-progress "$(Build.SourcesDirectory)/$(appDir)"
  displayName: trivy Scan (code)

- task: DockerInstaller@0
  inputs:
    dockerVersion: '17.09.0-ce'
  displayName: Docker tool installer

- task: Docker@2
  inputs:
    containerRegistry: 'dockerhub-con'
    repository: 'dineesh1998/pickles-website'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
  displayName: Docker build and push

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      set -euo pipefail
          
      IMAGE="$(dockerRepo):$(dockerTag)"
      echo "Scanning docker image: $IMAGE"
          
      trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress "$IMAGE"
  displayName: Trivy scan (Docker image)

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: 'build/**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/drop'
  displayName: Copy file to

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/build'
    ArtifactName: 'drop'
    publishLocation: 'Container'